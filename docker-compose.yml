# ============================================================
#  Локальний Neo4j 5.18 з APOC + GDS (Варіант A — основний шлях).
#  Запуск:  docker-compose up -d
#  Browser: http://localhost:7474   (логін neo4j / пароль password123)
#  Папка ./import монтується в контейнер — звідти LOAD CSV читає file:///
# ============================================================
services:
  neo4j:
    image: neo4j:5.18-community
    container_name: neo4j_movielens
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt-протокол (драйвери, cypher-shell)
    environment:
      NEO4J_AUTH: neo4j/password123
      # Плагіни APOC (apoc.periodic.iterate для батч-завантаження) та GDS (PageRank, Louvain, Dijkstra)
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      # Дозволяємо виклик процедур apoc.* і gds.*
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      # Heap: початковий 512m, максимум 2G — достатньо для 1M ребер.
      # ВАЖЛИВО: не знижуйте max нижче 2G — ліміт пам'яті транзакції = 70% heap,
      # тож при 1G він падає до ~716 MiB і частина 5 (Louvain/Dijkstra) обірветься.
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2G"
      # Page cache — тримає граф у пам'яті для швидких обходів
      NEO4J_server_memory_pagecache_size: "1G"
      # Знімаємо ліміт пам'яті на транзакцію (0 = без ліміту), щоб матеріалізація
      # SIMILAR/CO_RATED у частині 5 не впиралась у dbms.memory.transaction.total.max
      NEO4J_dbms_memory_transaction_total_max: "0"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # Папка ./import монтується туди, звідки LOAD CSV читає файли через file:///
      - ./import:/var/lib/neo4j/import

volumes:
  neo4j_data:
  neo4j_logs:
